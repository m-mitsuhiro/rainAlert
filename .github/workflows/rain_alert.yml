name: Rain Alert

on:
  schedule:
    - cron: '*/30 21-23,0-13 * * *'
  workflow_dispatch:

jobs:
  check-rain:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Restore state
        uses: actions/cache/restore@v4
        with:
          path: state.json
          key: rain-alert-state-${{ github.run_id }}
          restore-keys: rain-alert-state-

      - name: Run rain alert
        env:
          RAIN_EMAIL_SENDER: ${{ secrets.RAIN_EMAIL_SENDER }}
          RAIN_EMAIL_PASSWORD: ${{ secrets.RAIN_EMAIL_PASSWORD }}
          RAIN_EMAIL_RECIPIENT: ${{ secrets.RAIN_EMAIL_RECIPIENT }}
        run: python main.py

      - name: Save state
        if: always()
        uses: actions/cache/save@v4
        with:
          path: state.json
          key: rain-alert-state-${{ github.run_id }}
